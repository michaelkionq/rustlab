[workspace]
members = [
    "crates/rustlab-core",
    "crates/rustlab-dsp",
    "crates/rustlab-plot",
    "crates/rustlab-script",
    "crates/rustlab-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.1"
edition = "2021"

[workspace.dependencies]
num-complex  = "0.4"
ndarray      = { version = "0.16", features = ["rayon"] }
rayon        = "1"
rand         = "0.8"
rand_distr   = "0.4"
zip          = "2"
thiserror    = "2"
anyhow       = "1"
rustlab-core   = { path = "crates/rustlab-core" }
rustlab-dsp    = { path = "crates/rustlab-dsp" }
rustlab-plot   = { path = "crates/rustlab-plot" }
rustlab-script = { path = "crates/rustlab-script" }
